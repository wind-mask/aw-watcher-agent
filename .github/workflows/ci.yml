name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt
        run: cargo fmt --check
      - name: Rust check
        run: cargo check --locked
      - name: Rust clippy
        run: cargo clippy --locked -- -D warnings
      - name: Rust test (incl. TS bindings export)
        run: cargo test --locked
      - name: Verify TS bindings up-to-date
        run: git diff --exit-code .pi/bindings/
      - name: Rust audit (advisory only)
        run: cargo audit --deny warnings || true
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check npm package contents
        run: npm pack --dry-run

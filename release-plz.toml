[workspace]
# release-plz handles version bump, git tag, and crates.io publishing.
# GitHub Release and npm publish are handled by release.yml (triggered by tag push).
publish = true

# The GitHub Release and artifacts are created by .github/workflows/release.yml
# when the tag is pushed, so we disable release-plz's built-in GitHub release.
git_release_enable = false
git_tag_name = "v{{ version }}"

# Only publish when the release-plz release PR is merged.
release_always = false

# This is a binary crate, and semver checks are not useful here.
semver_check = false
pr_labels = ["release"]

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

"""
